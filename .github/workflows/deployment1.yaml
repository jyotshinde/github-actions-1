name: workflow-1
on: push
jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - name: get code
              uses: actions/checkout@v4
            - name: install dependencies
              run: npm ci
            - name: lint package
              run: npm run lint
            - name: test it
              run: npm run test
            - name: run build
              run: npm run build
            - name: deploy code
              run: echo "code is being deployed"